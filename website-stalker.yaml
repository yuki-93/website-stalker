---
sites:
  # Basic example
  - url: https://edjopato.de/
    editors:
      - html_prettify

  - url: https://www.debian.org/releases/
    ignore_error: true
    editors:
      - css_select: "#content"
      - html_url_canonicalize
      - html_prettify
      - html_markdownify

  - url: https://blinry.org/
    editors:
      - css_select: .box
      - html_prettify

  - url: https://www.wdrmaus.de/extras/
    editors:
      - css_select: "#content"
      - css_remove: "script, img, .promoteaser, #footer"
      - html_url_canonicalize
      - html_markdownify
  - url:
      - https://www.wdrmaus.de/filme/sachgeschichten/?filter=alle
      - https://www.wdrmaus.de/filme/mausspots/index.php5?filter=alle
    editors:
      - css_select: .links
      - css_remove: script, img
      - html_url_canonicalize
      - html_markdownify

  - url: https://www.strauss.com/de/de
    editors:
      - css_select: body
      - css_remove: img, script, style, header, .imagemap
      - html_url_canonicalize
      - html_markdownify

  - url: https://www.evehome.com/en/blog
    editors:
      - rss:
          item_selector: .blog-post-teaser
          title_selector: .title
          content_editors:
            - css_select: body > div > div > *
            - css_remove: img, .title, .text-btn, .read-more-btn
            - html_textify
  - url:
      - https://www.evehome.com/en/matter
      - https://www.evehome.com/en/thread
    editors:
      - css_select: article .content
      - css_remove: img
      - html_markdownify

  - url: https://sbahn.berlin/fahren/bauen-stoerung/
    ignore_error: true
    editors:
      - css_select: main .c-box-list
      - html_url_canonicalize
      - html_markdownify

  - url: https://www.anker.com/eu-de
    editors:
      - css_remove: media, img, script, noscript, style
      - html_url_canonicalize
      - html_markdownify
      - regex_replace:
          pattern: '\n\d+[\n\s:]*(?:Tag|Std|Min|Sek)\S*\n'
          replace: ""
          
  - url: https://www.berliner-feuerwehr.de/aktuelles/einsaetze
    ignore_error: true
    editors:
      - css_select: "#layout-grid__area--maincontent"
      - css_remove: media, img, script, noscript, style
      - html_url_canonicalize
      - html_markdownify

  - url: https://nosleepclub.eu/
    editors:
      - css_remove: media, img, script, noscript, style
      - html_url_canonicalize
      - html_markdownify

  - url: https://status.personio.de/
    editors:
      - css_remove: media, img, script, noscript, style
      - html_url_canonicalize
      - html_markdownify

  - url: https://karriere.wetter.com/jobs
    editors:
      - css_remove: media, img, script, noscript, style, header, nav, footer
      - html_url_canonicalize
      - html_markdownify

  - url: https://www.avocadostore.de/jobs
    editors:
      - css_remove: media, img, script, noscript, style, a, header, nav, footer
      - html_url_canonicalize
      - html_markdownify

  - url: https://www.wetell.de/
    editors:
      # - css_select: body
      - css_remove: img, noscript, script, style
      - html_url_canonicalize
      - html_markdownify
  - url: https://www.wetell.de/service/faq/
    editors:
      - css_select: .faq-entry
      - css_remove: nav, img, noscript, script, style
      - css_tag_replace:
          selector: button
          replace: h4
      - html_markdownify
  - url:
      - https://www.wetell.de/community/spotlight/
      - https://www.wetell.de/warum-wetell/
      - https://www.wetell.de/service/
      - https://www.wetell.de/mobilfunk/optionen/esim/
    ignore_error: true
    editors:
      - css_select: main
      - css_remove: nav, img, noscript, script, style
      - html_markdownify
  - url:
      - https://www.wetell.de/service/downloads/
      - https://www.wetell.de/warum-wetell/mobilfunk-neu-denken/
      - https://www.wetell.de/warum-wetell/wirtschaft-aufmischen/
    editors:
      - css_select: main
      - css_remove: nav, img, noscript, script, style
      - css_tag_replace:
          selector: button
          replace: h4
      - html_markdownify

  - url: https://funksachen.wetell.de
    editors:
      - css_remove: nav, img, noscript, script, style
      - html_markdownify

  - url: https://www.waldeck-freakquenz.de
    editors:
      - css_remove: noscript, script, img, nav, style, iframe, form
      - html_markdownify

  - url: https://jobs.ashbyhq.com/ecosia.org
    editors:
      - css_remove: noscript, script, img, nav, style, iframe, form
      - html_markdownify
      
  - url: https://db.jobs/service/search/de-de/5441588?qli=true&query=frontend&queryJoined=&sort=pubExternalDate_tdt&itemsPerPage=20&pageNum=0     
    editors:
      - css_remove: noscript, script, img, nav, style, iframe, form
      - html_markdownify

      
